name: Full AI Test Pipeline (Plan -> Generate -> Execute -> Commit)

# Triggered from the deployed Streamlit app's "Submit New Request" form, only
# when the correct pipeline passphrase is supplied (see streamlit_app/app.py).
# Runs Claude Code non-interactively in this disposable, sandboxed CI
# container to turn a submitted testing request into a full plan + automation
# suite + execution + report, committing progress back to the request file
# at each stage so the app can show status on demand.
#
# EXPERIMENTAL: this is the first version of this workflow. Non-interactive
# Claude Code invocations with the playwright-test MCP server have not been
# verified end-to-end in a fresh Linux CI container before this was written.
# Expect to iterate after the first real trigger.

on:
  workflow_dispatch:
    inputs:
      request_file:
        description: 'Path to the user-stories/request-*.md file to process'
        required: true
        type: string
      slug:
        description: 'Deterministic slug for output paths (specs/<slug>-test-plan.md, tests/<slug>/)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  full-pipeline:
    timeout-minutes: 180
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_USE_BEDROCK: "1"
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      AWS_REGION: eu-north-1
      REQUEST_FILE: ${{ inputs.request_file }}
      SLUG: ${{ inputs.slug }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Configure git identity for automated commits
        run: |
          git config user.name "qa-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Use a Linux-safe MCP server config for this run
        run: |
          cat > .mcp.json <<'EOF'
          {
            "mcpServers": {
              "playwright-test": {
                "command": "npx",
                "args": ["playwright", "run-test-mcp-server"]
              }
            }
          }
          EOF

      - name: Debug workflow inputs
        run: |
          echo "REQUEST_FILE='$REQUEST_FILE'"
          echo "SLUG='$SLUG'"
          pwd
          ls -R

      - name: Verify request file exists
        run: test -f "$REQUEST_FILE"

      - name: Set status -- planning
        run: |
          node .github/scripts/set-request-status.js "$REQUEST_FILE" "In progress -- generating test plan"
          git add "$REQUEST_FILE"
          git commit -m "chore(pipeline): start test plan generation for $SLUG" || true
          git push

      - name: Claude Code -- generate test plan
        run: |
          npx claude -p "Read the testing request at \$REQUEST_FILE (application URL, requirements/acceptance criteria, optional test credentials). Use the playwright-test-planner subagent to explore the live application at that URL and produce a comprehensive test plan covering happy paths, negative/boundary cases, and navigation flows, following this project's TC-<MODULE>-<NNN> convention (see CLAUDE.md). Save the plan to specs/${SLUG}-test-plan.md exactly -- no other path. Do not modify any file outside specs/${SLUG}-test-plan.md." \
            --dangerously-skip-permissions
       
      - name: Verify plan was created
        run: |
          test -f "specs/${SLUG}-test-plan.md" || (node .github/scripts/set-request-status.js "$REQUEST_FILE" "FAILED at planning stage -- see Actions run" && git add "$REQUEST_FILE" && git commit -m "chore(pipeline): planning failed for $SLUG" && git push && exit 1)

      - name: Commit test plan, set status -- generating automation
        run: |
          git add "specs/${SLUG}-test-plan.md"
          node .github/scripts/set-request-status.js "$REQUEST_FILE" "In progress -- test plan generated, generating automation suite"
          git add "$REQUEST_FILE"
          git commit -m "feat(pipeline): add test plan for $SLUG"
          git push

      - name: Claude Code -- generate automation suite
        run: |
          npx claude -p "Read the test plan at specs/${SLUG}-test-plan.md. Use the playwright-test-generator subagent to create a Playwright TypeScript automation suite implementing every test case in that plan, using Page Object Model, one test() per test case named with its Test Case ID. Write all files under tests/${SLUG}/ only -- do not write outside that directory, and do not modify your own agent definition or any .claude/ file." \
            --dangerously-skip-permissions
        env:
          SLUG: ${{ inputs.slug }}

      - name: Verify automation suite was created
        run: |
          if [ -z "$(find tests/${SLUG} -name '*.spec.ts' 2>/dev/null)" ]; then
            node .github/scripts/set-request-status.js "$REQUEST_FILE" "FAILED at generation stage -- see Actions run"
            git add "$REQUEST_FILE"
            git commit -m "chore(pipeline): generation failed for $SLUG"
            git push
            exit 1
          fi

      - name: Commit automation suite, set status -- executing
        run: |
          git add "tests/${SLUG}/"
          node .github/scripts/set-request-status.js "$REQUEST_FILE" "In progress -- automation generated, executing tests (Chromium/Firefox/WebKit)"
          git add "$REQUEST_FILE"
          git commit -m "feat(pipeline): add automation suite for $SLUG"
          git push

      - name: Run the generated suite
        id: run_tests
        continue-on-error: true
        run: |
          npx playwright test "tests/${SLUG}" --project=chromium --project=firefox --project=webkit --reporter=list 2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Set final status
        run: |
          RESULT_LINE=$(grep -E "^\s*[0-9]+ (passed|failed)" test-output.log | tail -1 || echo "unknown result")
          node .github/scripts/set-request-status.js "$REQUEST_FILE" "Completed -- ${RESULT_LINE}. See Actions run and playwright-report artifact for details."
          git add "$REQUEST_FILE"
          git commit -m "chore(pipeline): mark $SLUG complete -- ${RESULT_LINE}"
          git push

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ${{ inputs.slug }}-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Fail the job if tests failed
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
