name: SauceDemo Checkout Regression (SCRUM-101)
on:
  push:
    branches: [ main, master ]
    paths:
      - 'tests/saucedemo-checkout/**'
      - 'specs/saucedemo-checkout-test-plan.md'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/saucedemo-checkout.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'tests/saucedemo-checkout/**'
      - 'specs/saucedemo-checkout-test-plan.md'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/saucedemo-checkout.yml'
  schedule:
    # Runs against the live https://www.saucedemo.com app daily, since we don't
    # control that app's own repo/commits — this is what catches a regression
    # introduced on the application side rather than in our own test code.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run SauceDemo checkout suite (Chromium, Firefox, WebKit)
        run: npx playwright test tests/saucedemo-checkout --project=chromium --project=firefox --project=webkit
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: saucedemo-checkout-playwright-report
          path: playwright-report/
          retention-days: 30
